      forecast_task_shadow_enabled: true
      task_backstop_enabled: false
    forecast_checkpoint: safe_rl_output/runs/safe_rl_test_run/stage2/wcdt_v3_predictor.pt
  - name: wcdt_v3_prediction_shield_task_backstop
    forecast_features: true
    shield: true
    model_path: safe_rl_output/runs/safe_rl_test_run_forecast_wcdt_v3/stage3/ppo_model.zip
