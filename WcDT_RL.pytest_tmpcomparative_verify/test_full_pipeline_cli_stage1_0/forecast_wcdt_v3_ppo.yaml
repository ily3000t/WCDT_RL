scenario:
  traci_subscriptions_enabled: true
  persistent_sumo_reset: true
  persistent_sumo_restart_interval: 100
stage1:
  workers: 6
  shard_episodes: 25
  replay_mode: risk_or_failure
  log_every_episodes: 20
training:
  ppo_num_envs: 4
  ppo_start_method: spawn
  ppo_worker_torch_threads: 1
  ppo_main_torch_threads: 4
rl:
  n_steps: 256
  batch_size: 64
  use_wcdt_forecast_features: true
run:
  run_id: safe_rl_test_run_forecast_wcdt_v3
forecast_features:
  enabled: true
  use_for_ppo_observation: true
  source: wcdt_v3
  checkpoint: safe_rl_output/runs/safe_rl_test_run/stage2/wcdt_v3_predictor.pt
  allow_heuristic_fallback: false
shield:
  forecast_aware_candidate_ranking_mode: 'off'
  forecast_task_shadow_enabled: false
  task_backstop_enabled: false
