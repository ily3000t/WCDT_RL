scenario:
  episode_seconds: 6.0
stage1:
  episodes: 2
  audit_gate:
    enabled: false
stage4:
  episodes: 1
stage5:
  episodes_per_group: 1
  seeds:
  - 1
  groups:
  - name: ppo
    forecast_features: false
    shield: false
    model_path: safe_rl_output/runs/safe_rl_smoke_profile/stage3/ppo_model.zip
  - name: ppo_shield
    forecast_features: false
    shield: true
    model_path: safe_rl_output/runs/safe_rl_smoke_profile/stage3/ppo_model.zip
  - name: ppo_cv_features
    forecast_features: true
    shield: false
    model_path: safe_rl_output/runs/safe_rl_smoke_profile_forecast_cv/stage3/ppo_model.zip
    forecast_source: constant_velocity
  - name: cv_prediction_shield
    forecast_features: true
    shield: true
    model_path: safe_rl_output/runs/safe_rl_smoke_profile_forecast_cv/stage3/ppo_model.zip
    forecast_source: constant_velocity
  - name: ppo_wcdt_v2_features
    forecast_features: true
    shield: false
    model_path: safe_rl_output/runs/safe_rl_smoke_profile_forecast_wcdt_v2/stage3/ppo_model.zip
    forecast_source: wcdt_v2
    forecast_checkpoint: safe_rl_output/runs/safe_rl_smoke_profile/stage2/wcdt_v2_predictor.pt
  - name: wcdt_v2_prediction_shield
    forecast_features: true
    shield: true
    model_path: safe_rl_output/runs/safe_rl_smoke_profile_forecast_wcdt_v2/stage3/ppo_model.zip
    forecast_source: wcdt_v2
    forecast_checkpoint: safe_rl_output/runs/safe_rl_smoke_profile/stage2/wcdt_v2_predictor.pt
  - name: ppo_wcdt_v3_features
    forecast_features: true
    shield: false
    model_path: safe_rl_output/runs/safe_rl_smoke_profile_forecast_wcdt_v3/stage3/ppo_model.zip
    forecast_source: wcdt_v3
    forecast_checkpoint: safe_rl_output/runs/safe_rl_smoke_profile/stage2/wcdt_v3_predictor.pt
  - name: wcdt_v3_prediction_shield
    forecast_features: true
    shield: true
    model_path: safe_rl_output/runs/safe_rl_smoke_profile_forecast_wcdt_v3/stage3/ppo_model.zip
    forecast_source: wcdt_v3
    forecast_checkpoint: safe_rl_output/runs/safe_rl_smoke_profile/stage2/wcdt_v3_predictor.pt
rl:
  total_timesteps: 8
  n_steps: 8
  batch_size: 8
stage3:
  eval_enabled: false
prediction:
  wcdt_v2_epochs: 1
  wcdt_v2_ensemble_size: 1
  wcdt_v3_epochs: 1
  wcdt_v3_ensemble_size: 1
risk_module:
  epochs: 1
run:
  run_id: safe_rl_smoke_profile
