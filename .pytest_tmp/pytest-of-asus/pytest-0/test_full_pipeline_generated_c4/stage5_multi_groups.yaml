run:
  run_id: safe_rl_smoke
stage5:
  episodes_per_group: 2
  seeds:
  - 1
  - 2
  groups:
  - name: ppo
    forecast_features: false
    shield: false
    model_path: safe_rl_output/runs/safe_rl_smoke/stage3/ppo_model.zip
  - name: ppo_shield
    forecast_features: false
    shield: true
    model_path: safe_rl_output/runs/safe_rl_smoke/stage3/ppo_model.zip
  - name: ppo_cv_features
    forecast_features: true
    shield: false
    model_path: safe_rl_output/runs/safe_rl_smoke_forecast_cv/stage3/ppo_model.zip
    forecast_source: constant_velocity
  - name: cv_prediction_shield
    forecast_features: true
    shield: true
    model_path: safe_rl_output/runs/safe_rl_smoke_forecast_cv/stage3/ppo_model.zip
    forecast_source: constant_velocity
  - name: ppo_wcdt_v3_features
    forecast_features: true
    shield: false
    model_path: safe_rl_output/runs/safe_rl_smoke_forecast_wcdt_v3/stage3/ppo_model.zip
    forecast_source: wcdt_v3
    forecast_checkpoint: safe_rl_output/runs/safe_rl_smoke/stage2/wcdt_v3_predictor.pt
  - name: wcdt_v3_prediction_shield
    forecast_features: true
    shield: true
    model_path: safe_rl_output/runs/safe_rl_smoke_forecast_wcdt_v3/stage3/ppo_model.zip
    forecast_source: wcdt_v3
    forecast_checkpoint: safe_rl_output/runs/safe_rl_smoke/stage2/wcdt_v3_predictor.pt
