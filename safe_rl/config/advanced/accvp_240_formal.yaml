# Formal ACCVP-240 collection configuration.  Run only after the pilot report
# is pass; no training path is configured until a matching formal oracle exists.
run:
  run_id: "accvp_240_formal"
  output_root: "safe_rl_output/runs"
  tensorboard: false

stage1:
  episodes: 400

accvp:
  enabled: false
  mode: "off"
  schema_version: 2
  activation_distance: 240.0
  candidate_plan_profile: "accvp_commitment_v1"
  response_horizon_s: 3.0
  response_horizon_steps: 30
  viability_horizon_s: 8.0
  candidate_plan_horizon_steps: 80
  warm_start:
    checkpoint: "safe_rl_output/runs/safe_rl_comparison_schema9_validation_001/stage2/wcdt_v3_predictor.pt"
  counterfactual:
    collection_phase: "formal"
    output_name: "accvp_240_formal"
    required_pilot_report: "safe_rl_output/runs/accvp_240_pilot/pilot_report.json"
    workers: 2
    shard_roots: 50
    risk_checkpoint: "safe_rl_output/runs/safe_rl_comparison_schema9_validation_001/stage2/risk_module.pt"
    policy_checkpoints:
      ppo: "safe_rl_output/runs/safe_rl_comparison_schema9_validation_001/stage3/ppo_model.zip"
      merge_timing: "safe_rl_output/runs/safe_rl_comparison_schema9_validation_001_forecast_wcdt_v3/stage3/ppo_model.zip"
    collection_jobs:
      - {name: "mixed_240", collection_source: "mixed", root_policy: "mixed", root_filter: "all", root_budget: 1000, roots_per_episode_limit: 3}
      - name: "ppo_240"
        collection_source: "ppo"
        root_policy: "ppo"
        root_filter: "all"
        root_budget: 1000
        roots_per_episode_limit: 3
        root_policy_checkpoint: "safe_rl_output/runs/safe_rl_comparison_schema9_validation_001/stage3/ppo_model.zip"
        config_overrides:
          forecast_features: {enabled: false}
          rl: {use_wcdt_forecast_features: false}
      - name: "merge_timing_240"
        collection_source: "merge_timing"
        root_policy: "merge_timing"
        root_filter: "all"
        root_budget: 1000
        roots_per_episode_limit: 3
        root_policy_checkpoint: "safe_rl_output/runs/safe_rl_comparison_schema9_validation_001_forecast_wcdt_v3/stage3/ppo_model.zip"
        config_overrides:
          forecast_features:
            enabled: true
            use_for_ppo_observation: true
            source: "wcdt_v3"
            checkpoint: "safe_rl_output/runs/safe_rl_comparison_schema9_validation_001/stage2/wcdt_v3_predictor.pt"
            allow_heuristic_fallback: false
          rl: {use_wcdt_forecast_features: true, reward_profile: "merge_timing_forecast"}
      - {name: "rule_240", collection_source: "rule", root_policy: "rule", root_filter: "all", root_budget: 1000, roots_per_episode_limit: 3}
      - {name: "deadline_hard_240", collection_source: "deadline_hard", root_policy: "mixed", root_filter: "activation_window", root_budget: 1000, roots_per_episode_limit: 3}
      - name: "merge_timing_oracle_seed2_5_240"
        collection_source: "oracle_seed2_5"
        root_policy: "merge_timing"
        root_filter: "activation_window"
        episode_seeds: [2, 5]
        root_budget: 0
        roots_per_episode_limit: 0
        root_policy_checkpoint: "safe_rl_output/runs/safe_rl_comparison_schema9_validation_001_forecast_wcdt_v3/stage3/ppo_model.zip"
        config_overrides:
          forecast_features:
            enabled: true
            use_for_ppo_observation: true
            source: "wcdt_v3"
            checkpoint: "safe_rl_output/runs/safe_rl_comparison_schema9_validation_001/stage2/wcdt_v3_predictor.pt"
            allow_heuristic_fallback: false
          rl: {use_wcdt_forecast_features: true, reward_profile: "merge_timing_forecast"}
